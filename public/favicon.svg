<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="eps-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" /> <!-- Teal -->
      <stop offset="50%" stop-color="#818cf8" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#c084fc" /> <!-- Purple -->
    </linearGradient>
  </defs>
  <!-- Render lowercase Greek Epsilon (ε) using monospace font family -->
  <text
    x="50%"
    y="50%"
    dominant-baseline="central"
    text-anchor="middle"
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    font-size="160"
    font-weight="bold"
    fill="url(#eps-grad)"
  >ε</text>
</svg>
