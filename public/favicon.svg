           C 83 6, 32 6, 32 44 
           C 32 59, 61 59, 61 64 
           C 61 69, 32 69, 32 84 
           C 32 122, 83 122, 98 106" 
        stroke="url(#eps-grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
</svg>
